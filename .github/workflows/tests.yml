# .github/workflows/python-tests.yml
name: Tic-Tac-Toe CI
# trigger the workflow on push or pull request events to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # This step downloads the repository content so the workflow can access it
    - name: Checkout code
      uses: actions/checkout@v3
      # This step installs the specified version of Python on the runner
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
      # This step upgrades pip and installs the pytest framework needed for testing
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
      # This step executes the test suite against the specified test file
    - name: Run tests with pytest
      run: |
        pytest test_game.py